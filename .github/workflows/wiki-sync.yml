name: Sync GitHub Wiki

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "readme.md"
      - "CHANGELOG.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "SUPPORT.md"
      - "package.json"
      - "package-lock.json"
      - ".github/scripts/generate-wiki.js"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.actor != 'github-actions[bot]' && (github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip wiki]')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate wiki pages
        run: npm run wiki:generate

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: Daniel-Ric/PlayFab-Catalog-Service-Bedrock.wiki
          path: wiki-repo
          token: ${{ secrets.WIKI_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Publish generated wiki
        shell: bash
        run: |
          rsync -a --delete build/wiki/ wiki-repo/
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "Wiki is already up to date."
            exit 0
          fi
          git commit -m "docs(wiki): sync generated project wiki"
          git push
