/marketplace/resolve/batch/{alias}:
  post:
    tags:
      - Marketplace
    summary: Resolve multiple items by Id or AlternateId
    description: Uses PlayFab Catalog/GetItems to resolve up to 50 item IDs or alternate IDs in one request.
    security:
      - BearerAuth: [ ]
    parameters:
      - in: path
        name: alias
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MarketplaceResolveBatchRequest'
    responses:
      "200":
        description: OK
        headers:
          ETag:
            schema:
              type: string
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarketplaceResolveBatchResponse'
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
      "404":
        description: Not found
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Error'
