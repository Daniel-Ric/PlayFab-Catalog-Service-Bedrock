/marketplace/all/{alias}:
  get:
    tags:
      - Marketplace
    summary: Get all marketplace items
    description: Lists all items for a title alias with optional filters. Pagination is pushed to PlayFab unless a large split date range has to be merged locally.
    security:
      - BearerAuth: [ ]
    parameters:
      - in: path
        name: alias
        required: true
        schema:
          type: string
      - in: query
        name: tag
        required: false
        schema:
          type: string
      - in: query
        name: creatorName
        required: false
        schema:
          type: string
      - in: query
        name: expand
        required: false
        description: Optional comma-separated expansions. Use refs or references to include ResolvedReferences.
        schema:
          type: string
          example: refs
      - in: query
        name: full
        required: false
        description: Set to false to skip full `GetItems` enrichment for faster list responses.
        schema:
          type: boolean
      - in: query
        name: enrich
        required: false
        description: Alias for `full`.
        schema:
          type: boolean
      - in: query
        name: refs
        required: false
        description: Set to true to include ResolvedReferences; alternative to `expand=refs`.
        schema:
          type: boolean
      - in: query
        name: creationDateFrom
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: creationDateTo
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: lastModifiedDateFrom
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: lastModifiedDateTo
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: startDateFrom
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: startDateTo
        required: false
        schema:
          type: string
          format: date-time
      - in: query
        name: page
        required: false
        schema:
          type: integer
          minimum: 1
      - in: query
        name: pageSize
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
      - in: query
        name: skip
        required: false
        schema:
          type: integer
          minimum: 0
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 1000
    responses:
      "200":
        description: OK
        headers:
          ETag:
            schema:
              type: string
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Item"
      "400":
        description: Bad request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
      "401":
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
      "403":
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
      "404":
        description: Not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
      "500":
        description: Server error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Error"
