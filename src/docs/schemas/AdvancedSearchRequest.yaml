AdvancedSearchRequest:
  type: object
  properties:
    query:
      type: string
      maxLength: 200
    filters:
      type: object
      properties:
        tags:
          type: array
          items:
            type: string
        tagsAny:
          type: array
          items:
            type: string
        tagsAll:
          type: array
          items:
            type: string
        excludeTags:
          type: array
          items:
            type: string
        creatorIds:
          type: array
          items:
            type: string
        creatorName:
          type: string
        itemIds:
          type: array
          items:
            type: string
        friendlyIds:
          type: array
          items:
            type: string
        catalogVersion:
          type: string
        priceMin:
          type: integer
          minimum: 0
        priceMax:
          type: integer
          minimum: 0
        isFree:
          type: boolean
        createdFrom:
          type: string
          format: date-time
        createdTo:
          type: string
          format: date-time
        updatedFrom:
          type: string
          format: date-time
        updatedTo:
          type: string
          format: date-time
        startFrom:
          type: string
          format: date-time
        startTo:
          type: string
          format: date-time
        endFrom:
          type: string
          format: date-time
        endTo:
          type: string
          format: date-time
        contentTypes:
          type: array
          items:
            type: string
        excludeContentTypes:
          type: array
          items:
            type: string
        platforms:
          type: array
          items:
            type: string
        excludePlatforms:
          type: array
          items:
            type: string
        ratingMin:
          type: number
          minimum: 0
        ratingMax:
          type: number
          minimum: 0
        ratingCountMin:
          type: integer
          minimum: 0
        raw:
          type: string
    sort:
      type: array
      items:
        type: object
        properties:
          field:
            type: string
          dir:
            type: string
            enum:
              - asc
              - desc
